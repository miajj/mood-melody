<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日心曲 · Today's Melody</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  font-family: Georgia, serif; color: #e8e0d0;
}

/* ── LOADING SCREEN ── */
#loading-screen {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  flex-direction: column; align-items: center; justify-content: center; gap: 32px;
}
#loading-screen.visible { display: flex; }
.loading-piano { font-size: 56px; animation: pianoFloat 2s ease-in-out infinite; }
@keyframes pianoFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.loading-notes { display: flex; gap: 6px; align-items: flex-end; height: 44px; }
.loading-note {
  width: 6px; border-radius: 3px;
  background: linear-gradient(180deg, #a090c8, #4a3f6b);
  animation: noteWave 1.4s ease-in-out infinite;
}
.loading-note:nth-child(1){height:60%;animation-delay:0s}
.loading-note:nth-child(2){height:100%;animation-delay:0.1s}
.loading-note:nth-child(3){height:75%;animation-delay:0.2s}
.loading-note:nth-child(4){height:90%;animation-delay:0.3s}
.loading-note:nth-child(5){height:55%;animation-delay:0.4s}
.loading-note:nth-child(6){height:80%;animation-delay:0.5s}
.loading-note:nth-child(7){height:65%;animation-delay:0.6s}
@keyframes noteWave {
  0%,100%{transform:scaleY(0.3);opacity:0.4}
  50%{transform:scaleY(1);opacity:1}
}
.loading-steps { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.loading-step { font-size: 13px; color: #6a6a7a; letter-spacing: 1px; transition: all 0.5s; opacity: 0; transform: translateY(4px); }
.loading-step.active { color: #c0b8d0; opacity: 1; transform: translateY(0); }
.loading-step.done { color: #5a7a5a; opacity: 0.5; }

/* ── LAYOUT ── */
#app { max-width: 460px; margin: 0 auto; padding: 24px; }
.view { display: none; }
.view.visible { display: block; }

.top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.lang-bar { display: flex; gap: 6px; }
.lang-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:5px 10px; cursor:pointer; color:#6a6a7a; font-size:11px; transition:all 0.2s; }
.lang-btn.active { background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.3); color:#e8e0d0; }
.history-btn { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:5px 12px; cursor:pointer; color:#6a6a7a; font-size:11px; }
.history-btn:hover { background:rgba(255,255,255,0.1); color:#c0b8d0; }

.header { text-align: center; margin-bottom: 24px; }
.header .piano { font-size: 36px; margin-bottom: 8px; }
.header h1 { font-size: 22px; font-weight: normal; letter-spacing: 2px; }
.header .date { font-size: 12px; color: #5a5a6a; margin-top: 6px; }

.card { background:rgba(255,255,255,0.05); border-radius:16px; padding:18px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.08); }
.card-dim { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,0.06); }
.card-label { color:#6a6a7a; font-size:11px; letter-spacing:1px; margin-bottom:10px; }

.pack-grid { display:flex; gap:8px; }
.pack-btn { flex:1; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:7px 8px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; transition:all 0.2s; }
.pack-btn.active { background:rgba(255,255,255,0.14); border-color:rgba(255,255,255,0.28); }
.pack-btn .pack-emoji { font-size:20px; }
.pack-btn .pack-name { color:#6a6a7a; font-size:10px; }
.pack-btn.active .pack-name { color:#c0b8d0; }

.mood-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.mood-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09); border-radius:12px; padding:10px 4px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; transition:all 0.18s; }
.mood-btn .mood-emoji { font-size:22px; line-height:1; }
.mood-btn .mood-name { color:#7a7a8a; font-size:10px; text-align:center; }
.mood-btn.active .mood-name { color:#e8e0d0; }
.mood-question { color:#b0a090; font-size:13px; margin-bottom:14px; }

textarea { width:100%; min-height:90px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px; color:#e0d8c8; font-size:14px; font-family:Georgia,serif; resize:vertical; outline:none; line-height:1.6; }
.journal-question { color:#b0a090; font-size:13px; margin-bottom:12px; }

.generate-btn { width:100%; padding:16px; border:none; border-radius:14px; color:#444; font-size:15px; letter-spacing:2px; cursor:not-allowed; background:rgba(255,255,255,0.05); transition:all 0.3s; font-family:Georgia,serif; }
.generate-btn.ready { background:linear-gradient(135deg,#4a3f6b,#2d5a8e); color:#e8e0d0; cursor:pointer; }

/* ── RESULT ── */
.result-hero {
  background: linear-gradient(135deg, rgba(74,63,107,0.5), rgba(45,90,142,0.5));
  border-radius: 24px; padding: 32px 24px; margin-bottom: 16px;
  border: 1px solid rgba(255,255,255,0.15); text-align: center; position: relative; overflow: hidden;
}
.result-hero::before { content:""; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%, rgba(160,140,200,0.15) 0%, transparent 70%); }
.mood-emoji-big { font-size:42px; margin-bottom:12px; display:block; }
.exclusive-label { font-size:10px; color:#6a6a7a; letter-spacing:3px; text-transform:uppercase; margin-bottom:12px; }
.piece-title { font-size:26px; font-weight:normal; letter-spacing:3px; margin-bottom:16px; color:#e8e0d0; }
.opening { color:#c0b0a0; font-size:15px; line-height:1.8; font-style:italic; }

/* ── PIANO PLAYER ── */
.piano-player {
  background: rgba(255,255,255,0.05); border-radius:16px; padding:20px;
  margin-bottom:12px; border:1px solid rgba(255,255,255,0.08);
}
.piano-player-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.piano-player-title { color:#8a8a9a; font-size:11px; letter-spacing:2px; }
.piano-visualizer { display:flex; justify-content:center; align-items:flex-end; gap:3px; height:48px; margin-bottom:16px; }
.vis-bar { width:4px; border-radius:2px; background:linear-gradient(180deg,#a090c8,#4a3f6b); transition:height 0.1s; min-height:3px; }
.piano-controls { display:flex; align-items:center; gap:12px; }
.play-btn {
  width:44px; height:44px; border-radius:50%; border:none; cursor:pointer;
  background:linear-gradient(135deg,#4a3f6b,#2d5a8e); color:#e8e0d0; font-size:18px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s;
}
.play-btn:hover { transform:scale(1.05); }
.play-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.progress-container { flex:1; }
.progress-track { height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; cursor:pointer; }
.progress-fill { height:100%; background:linear-gradient(90deg,#4a3f6b,#a090c8); border-radius:2px; width:0%; transition:width 0.1s linear; }
.time-label { color:#5a5a6a; font-size:10px; margin-top:5px; text-align:right; }
.piano-loading { text-align:center; padding:10px 0; }
.piano-loading-text { color:#8a8a9a; font-size:12px; letter-spacing:1px; }

.card { background:rgba(255,255,255,0.05); border-radius:16px; padding:18px; margin-bottom:12px; border:1px solid rgba(255,255,255,0.08); }
.music-label { color:#5a5a6a; font-size:11px; letter-spacing:2px; margin-bottom:12px; }
.music-desc { color:#c8c0b0; font-size:14px; line-height:1.8; margin-bottom:10px; }
.emotional-arc { color:#8888a0; font-size:13px; font-style:italic; }
.tech-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.tech-label { color:#444; font-size:10px; letter-spacing:1px; margin-bottom:3px; }
.tech-value { color:#b0a890; font-size:12px; }
.closing { color:#9a9080; font-size:14px; line-height:1.9; font-style:italic; text-align:center; }

.action-row { display:flex; gap:10px; margin-top:4px; }
.share-btn { flex:1; padding:14px; background:rgba(160,140,200,0.12); border:1px solid rgba(160,140,200,0.25); border-radius:14px; color:#a090c8; font-size:13px; letter-spacing:1px; cursor:pointer; font-family:Georgia,serif; }
.share-btn:hover { background:rgba(160,140,200,0.2); }
.new-btn { flex:1; padding:14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:14px; color:#6a6a7a; font-size:13px; letter-spacing:1px; cursor:pointer; font-family:Georgia,serif; }

/* ── HISTORY ── */
.history-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.back-btn { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:6px 12px; cursor:pointer; color:#9a9aaa; font-size:12px; font-family:Georgia,serif; }
.history-title-text { font-size:18px; font-weight:normal; letter-spacing:2px; }
.history-empty { text-align:center; padding:40px 20px; color:#5a5a6a; font-size:14px; line-height:2; }
.history-list { display:flex; flex-direction:column; gap:10px; }
.history-item { background:rgba(255,255,255,0.05); border-radius:14px; padding:16px; border:1px solid rgba(255,255,255,0.08); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:14px; }
.history-item:hover { background:rgba(255,255,255,0.08); }
.history-emoji { font-size:28px; flex-shrink:0; }
.history-info { flex:1; min-width:0; }
.history-item-title { font-size:15px; color:#e8e0d0; letter-spacing:1px; margin-bottom:4px; }
.history-item-date { font-size:11px; color:#5a5a6a; }
.history-item-opening { font-size:12px; color:#9a9080; font-style:italic; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(74,63,107,0.95); border:1px solid rgba(160,140,200,0.3); border-radius:12px; padding:12px 20px; font-size:13px; color:#e8e0d0; opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; z-index:200; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-piano">🎹</div>
  <div class="loading-notes">
    <div class="loading-note"></div><div class="loading-note"></div><div class="loading-note"></div>
    <div class="loading-note"></div><div class="loading-note"></div><div class="loading-note"></div>
    <div class="loading-note"></div>
  </div>
  <div class="loading-steps">
    <div class="loading-step" id="ls-1">聆听你的心情……</div>
    <div class="loading-step" id="ls-2">理解情绪脉络……</div>
    <div class="loading-step" id="ls-3">为你构思旋律……</div>
    <div class="loading-step" id="ls-4">正在谱写今日心曲……</div>
  </div>
</div>

<div id="app">
  <div class="top-nav">
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="zh">🇨🇳 中文</button>
      <button class="lang-btn" data-lang="en">🇺🇸 EN</button>
      <button class="lang-btn" data-lang="ja">🇯🇵 JP</button>
    </div>
    <button class="history-btn" id="history-btn">📖 <span id="history-btn-label">日记</span></button>
  </div>

  <div class="header">
    <div class="piano">🎹</div>
    <h1 id="app-title">今日心曲</h1>
    <div class="date" id="today-date"></div>
  </div>

  <!-- INPUT -->
  <div id="input-view" class="view visible">
    <div class="card card-dim">
      <div class="card-label" id="emoji-style-label">选择表情风格</div>
      <div class="pack-grid">
        <button class="pack-btn active" data-pack="classic"><span class="pack-emoji">😊</span><span class="pack-name">Classic</span></button>
        <button class="pack-btn" data-pack="nature"><span class="pack-emoji">🌸</span><span class="pack-name">Nature</span></button>
        <button class="pack-btn" data-pack="kawaii"><span class="pack-emoji">🐣</span><span class="pack-name">Kawaii</span></button>
        <button class="pack-btn" data-pack="food"><span class="pack-emoji">🍓</span><span class="pack-name">Food</span></button>
      </div>
    </div>
    <div class="card">
      <div class="mood-question" id="mood-question">今天，你的心情更接近？</div>
      <div class="mood-grid" id="mood-grid"></div>
    </div>
    <div class="card">
      <div class="journal-question" id="journal-question">今天发生了什么？或者，你现在在想什么？</div>
      <textarea id="journal-text" placeholder="随便写几句话就好……"></textarea>
    </div>
    <div class="card card-dim">
      <div class="card-label">🎵 <span id="apikey-label">Gemini API Key（用于生成真实音乐）</span></div>
      <div class="apikey-row">
        <input type="password" id="apikey-input" class="apikey-input" placeholder="AIza... (aistudio.google.com/apikey)">
        <button class="toggle-btn" id="toggle-key">👁️</button>
      </div>
      <div class="apikey-hint">不填只生成文字描述，不播放音乐</div>
    </div>
    <button class="generate-btn" id="generate-btn">为今天谱一首曲 🎵</button>
  </div>

  <!-- RESULT -->
  <div id="result-view" class="view">
    <div class="result-hero">
      <span class="mood-emoji-big" id="result-emoji"></span>
      <div class="exclusive-label" id="exclusive-label">今日专属</div>
      <div class="piece-title" id="piece-title"></div>
      <div class="opening" id="opening"></div>
    </div>

    <!-- Lyria Music Player -->
    <div class="piano-player" id="music-player" style="display:none">
      <div class="piano-player-header">
        <span class="piano-player-title">🎵 今日专属音乐</span>
        <span id="music-status" style="font-size:11px;color:#6a6a7a"></span>
      </div>
      <div class="piano-visualizer" id="piano-visualizer"></div>
      <div id="player-generating" style="text-align:center;padding:8px 0">
        <div class="mini-notes" style="display:flex;justify-content:center;gap:5px;align-items:flex-end;height:28px;margin-bottom:10px">
          <div style="width:4px;border-radius:2px;background:linear-gradient(180deg,#a090c8,#4a3f6b);animation:noteWave 1.2s ease-in-out 0s infinite"></div>
          <div style="width:4px;border-radius:2px;background:linear-gradient(180deg,#a090c8,#4a3f6b);animation:noteWave 1.2s ease-in-out 0.12s infinite"></div>
          <div style="width:4px;border-radius:2px;background:linear-gradient(180deg,#a090c8,#4a3f6b);animation:noteWave 1.2s ease-in-out 0.24s infinite"></div>
          <div style="width:4px;border-radius:2px;background:linear-gradient(180deg,#a090c8,#4a3f6b);animation:noteWave 1.2s ease-in-out 0.36s infinite"></div>
          <div style="width:4px;border-radius:2px;background:linear-gradient(180deg,#a090c8,#4a3f6b);animation:noteWave 1.2s ease-in-out 0.48s infinite"></div>
        </div>
        <div id="gen-text" style="color:#8a8a9a;font-size:13px;margin-bottom:10px">正在为你生成音乐……</div>
        <div style="height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden">
          <div style="height:100%;border-radius:2px;background:linear-gradient(90deg,#4a3f6b,#a090c8,#2d5a8e);background-size:200% 100%;animation:shimmer 2s linear infinite"></div>
        </div>
      </div>
      <div id="player-ready" style="display:none">
        <div style="color:#8a8a9a;font-size:11px;letter-spacing:1px;margin-bottom:10px;text-align:center" id="playing-label">♪ 正在播放</div>
        <audio id="audio-player" controls style="width:100%;border-radius:8px"></audio>
      </div>
      <div id="player-error" style="display:none;padding:8px">
        <div style="color:#c08080;font-size:12px;margin-bottom:6px">⚠️ 音乐生成失败</div>
        <div id="error-detail" style="font-family:monospace;font-size:10px;color:#ff9999;word-break:break-all"></div>
      </div>
    </div>

    <div class="card">
      <div class="music-label" id="music-label">🎼 乐曲描述</div>
      <div class="music-desc" id="music-desc"></div>
      <div class="emotional-arc" id="emotional-arc"></div>
    </div>
    <div class="card card-dim tech-grid" id="tech-grid"></div>
    <div class="card card-dim" style="margin-bottom:16px;text-align:center">
      <div class="closing" id="closing-thought"></div>
    </div>
    <div class="action-row">
      <button class="share-btn" id="share-btn">↗ <span id="share-label">分享</span></button>
      <button class="new-btn" id="new-btn">记录明天</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="history-view" class="view">
    <div class="history-header">
      <button class="back-btn" id="history-back">← 返回</button>
      <div class="history-title-text" id="history-title">音乐日记</div>
    </div>
    <div id="history-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const LANGS = {
  zh: {
    appTitle:"今日心曲", moodQuestion:"今天，你的心情更接近？",

    generateBtn:"为今天谱一首曲 🎵",
    exclusiveLabel:"今日专属", musicLabel:"🎼 乐曲描述",

    newEntryBtn:"记录明天", emojiStyleLabel:"选择表情风格",

    pianoLabel:"🎹 钢琴演奏", pianoLoading:"正在谱写旋律……", pianoReady:"点击播放",
    shareText:(t,o)=>`《${t}》\n${o}\n\n— 来自今日心曲`,
    toastCopied:"已复制到剪贴板 ✓",

    fallback:{title:"今日心绪",opening:"你今天的感受，我都听见了。",musical_description:"一首安静的钢琴小品，像傍晚的光，不急不缓。",emotional_arc:"从复杂慢慢走向平静",closing_thought:"每一种感受都值得被好好对待。",melody:[
        {note:"E4",duration:"4n",time:0,velocity:0.7},{note:"G4",duration:"4n",time:0.5,velocity:0.6},
        {note:"A4",duration:"4n",time:1.0,velocity:0.75},{note:"G4",duration:"4n",time:1.5,velocity:0.55},

        {note:"G4",duration:"2n",time:4.5,velocity:0.6},{note:"A4",duration:"4n",time:5.5,velocity:0.7},
        {note:"C5",duration:"4n",time:6.0,velocity:0.75},{note:"B4",duration:"4n",time:6.5,velocity:0.6},
        {note:"A4",duration:"4n",time:7.0,velocity:0.65},{note:"G4",duration:"2n",time:7.5,velocity:0.5}
      ],chords:[
        {notes:["C3","E3","G3"],duration:"2n",time:0,velocity:0.35},
        {notes:["G2","B2","D3"],duration:"2n",time:1.0,velocity:0.3},
        {notes:["A2","C3","E3"],duration:"2n",time:2.0,velocity:0.35},
        {notes:["F2","A2","C3"],duration:"2n",time:3.0,velocity:0.3},
        {notes:["C3","E3","G3"],duration:"2n",time:4.0,velocity:0.35},

        {notes:["A2","C3","E3"],duration:"2n",time:6.0,velocity:0.35},
        {notes:["F2","A2","C3"],duration:"2n",time:7.0,velocity:0.3}
      ]},

// ── STATE ──
let currentLang="zh", currentPack="classic", selectedMood=null, currentResult=null;
let keyVisible=false;
document.getElementById("toggle-key").addEventListener("click",()=>{
  keyVisible=!keyVisible;

});

// ── LOADING ──
let loadingInterval=null;
function showLoading(L) {
  const steps=L.loadingSteps;
  for(let i=1;i<=4;i++){const el=document.getElementById(`ls-${i}`);el.textContent=steps[i-1];el.className="loading-step";}
  document.getElementById("loading-screen").classList.add("visible");
  let step=0;
  document.getElementById("ls-1").classList.add("active");
  loadingInterval=setInterval(()=>{
    if(step<3){document.getElementById(`ls-${step+1}`).classList.remove("active");document.getElementById(`ls-${step+1}`).classList.add("done");step++;document.getElementById(`ls-${step+1}`).classList.add("active");}
  },900);
}
function hideLoading(){clearInterval(loadingInterval);document.getElementById("loading-screen").classList.remove("visible");}

// ── INIT ──
function init(){updateLangUI();renderMoodGrid();renderVisualizer();}

function updateLangUI(){
  const L=LANGS[currentLang];
  document.getElementById("app-title").textContent=L.appTitle;
  document.getElementById("today-date").textContent=new Date().toLocaleDateString(L.dateLocale,{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  document.getElementById("emoji-style-label").textContent=L.emojiStyleLabel;
  document.getElementById("mood-question").textContent=L.moodQuestion;
  document.getElementById("journal-question").textContent=L.journalQuestion;
  document.getElementById("journal-text").placeholder=L.journalPlaceholder;
  document.getElementById("generate-btn").textContent=L.generateBtn;
  document.getElementById("history-btn-label").textContent=L.historyLabel;
  document.getElementById("share-label").textContent=L.shareLabel;
  document.getElementById("new-btn").textContent=L.newEntryBtn;
  renderMoodGrid();
}

function renderMoodGrid(){
  const L=LANGS[currentLang];
  const grid=document.getElementById("mood-grid");
  const moods=EMOJI_PACKS[currentPack].moods;
  grid.innerHTML=moods.map(m=>{
    const color=MOOD_COLORS[m.k];
    const isActive=selectedMood===m.k;
    return `<button class="mood-btn ${isActive?"active":""}" data-mood="${m.k}" data-emoji="${m.e}" style="${isActive?`background:${color}55;border-color:${color}`:""}">
      <span class="mood-emoji">${m.e}</span>
      <span class="mood-name">${L.moodLabels[m.k]}</span>
    </button>`;
  }).join("");
  grid.querySelectorAll(".mood-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{selectedMood=btn.dataset.mood;renderMoodGrid();updateGenerateBtn();});
  });
}

function updateGenerateBtn(){
  const btn=document.getElementById("generate-btn");
  const hasText=document.getElementById("journal-text").value.trim().length>0;
  btn.className=(selectedMood&&hasText)?"generate-btn ready":"generate-btn";
}

function renderVisualizer(){
  const vis=document.getElementById("piano-visualizer");
  vis.innerHTML=Array(16).fill(0).map((_,i)=>`<div class="vis-bar" id="vb-${i}" style="height:3px"></div>`).join("");
}

// ── LANG ──

// ── PACK ──

  });

document.getElementById("journal-text").addEventListener("input",updateGenerateBtn);

// ── GENERATE ──
document.getElementById("generate-btn").addEventListener("click",async()=>{
  if(!selectedMood||!document.getElementById("journal-text").value.trim()) return;
  const L=LANGS[currentLang];
  const moodLabel=L.moodLabels[selectedMood];
  const journalText=document.getElementById("journal-text").value.trim();
  const activeMoodBtn=document.querySelector(`.mood-btn[data-mood="${selectedMood}"]`);
  const moodEmoji=activeMoodBtn?activeMoodBtn.dataset.emoji:"🎵";

  showLoading(L);

  let textResult=null;
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
        messages:[{role:"user",content:L.aiPrompt(moodLabel,journalText)}]})
    });
    const data=await res.json();
    const text=data.content.map(i=>i.text||"").join("");
    textResult=JSON.parse(text.replace(/```json|```/g,"").trim());
    // Safety: ensure melody exists
    if(!textResult.melody||!textResult.melody.length){
      textResult.melody=L.fallback.melody;
      textResult.chords=L.fallback.chords;
    }
  } catch(e){textResult=L.fallback;}

  const entry={id:Date.now(),date:new Date().toISOString(),lang:currentLang,moodKey:selectedMood,moodEmoji,moodLabel,journalText,result:textResult,music:MUSIC_STYLES[selectedMood]};
  saveToHistory(entry);
  currentResult=entry;

  hideLoading();
  showResult(textResult,selectedMood,moodEmoji,L);
  const apiKey = document.getElementById("apikey-input").value.trim();
  if (apiKey) {
    const moodLabel2 = LANGS[currentLang].moodLabels[selectedMood];
    const musicPrompt = `Instrumental piano piece only. Mood: ${moodLabel2}. No vocals, no singing, no lyrics, no voice, purely instrumental. Emotional and cinematic. Inspired by: "${document.getElementById("journal-text").value.trim()}". Smooth piano, gentle and introspective, acoustic.`;
    generateMusicLyria(musicPrompt, apiKey, L);
  }
});

// ── SHOW RESULT ──
function showResult(data,moodKey,moodEmoji,L){
  showView("result-view");
  document.getElementById("result-emoji").textContent=moodEmoji;
  document.getElementById("exclusive-label").textContent=L.exclusiveLabel;
  document.getElementById("piece-title").textContent=`《${data.title}》`;
  document.getElementById("opening").textContent=data.opening;
  document.getElementById("music-label").textContent=L.musicLabel;
  document.getElementById("music-desc").textContent=data.musical_description;
  document.getElementById("emotional-arc").textContent=data.emotional_arc;
  document.getElementById("closing-thought").textContent=`✦ ${data.closing_thought}`;
  document.getElementById("new-btn").textContent=L.newEntryBtn;
  document.getElementById("share-label").textContent=L.shareLabel;
  const ms=MUSIC_STYLES[moodKey];
  document.getElementById("tech-grid").innerHTML=[[L.styleLabel,ms.style],[L.tempoLabel,ms.tempo],[L.keyLabel,ms.key],[L.instrLabel,ms.instruments]].map(([l,v])=>`<div><div class="tech-label">${l}</div><div class="tech-value">${v}</div></div>`).join("");
  window.scrollTo(0,0);
}

// ── TONE.JS PIANO ──
async function generateMusicLyria(prompt, key, L) {
  const player = document.getElementById("music-player");
  player.style.display = "block";
  document.getElementById("player-generating").style.display = "block";
  document.getElementById("player-ready").style.display = "none";
  document.getElementById("player-error").style.display = "none";
  document.getElementById("gen-text").textContent = L.generatingMusic || "正在为你生成音乐……";
  document.getElementById("music-status").textContent = "";

  try {
    const res = await fetch("/api/music", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, apiKey: key })
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      showMusicError(data.error || "Unknown error");
      return;
    }

    const binary = atob(data.audioData);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: data.mimeType || "audio/mpeg" });
    const url = URL.createObjectURL(blob);

    document.getElementById("player-generating").style.display = "none";
    document.getElementById("player-ready").style.display = "block";
    document.getElementById("playing-label").textContent = L.playingLabel || "♪ 正在播放";
    const audio = document.getElementById("audio-player");
    audio.src = url;
    audio.play();
    document.getElementById("music-status").textContent = "";
  } catch(e) {
    showMusicError(e.message);
  }
}

function showMusicError(msg) {
  document.getElementById("player-generating").style.display = "none";
  document.getElementById("player-error").style.display = "block";
  document.getElementById("error-detail").textContent = msg;
}




// ── SHARE ──
document.getElementById("share-btn").addEventListener("click",async()=>{
  const L=LANGS[currentLang];
  if(!currentResult) return;
  const text=L.shareText(currentResult.result.title,currentResult.result.opening);
  try {
    if(navigator.share){await navigator.share({title:currentResult.result.title,text});}
    else{await navigator.clipboard.writeText(text);showToast(L.toastCopied);}
  }catch(e){try{await navigator.clipboard.writeText(text);showToast(L.toastCopied);}catch(_){}}
});

function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

// ── NEW ENTRY ──
document.getElementById("new-btn").addEventListener("click",()=>{

});

// ── HISTORY ──
function saveToHistory(entry){
  const h=getHistory();h.unshift(entry);if(h.length>100)h.pop();
  localStorage.setItem("moodmelody_history",JSON.stringify(h));
}
function getHistory(){try{return JSON.parse(localStorage.getItem("moodmelody_history")||"[]");}catch(e){return[];}}

document.getElementById("history-btn").addEventListener("click",()=>{showView("history-view");renderHistory();window.scrollTo(0,0);});
document.getElementById("history-back").addEventListener("click",()=>showView("input-view"));

function renderHistory(){
  const L=LANGS[currentLang];
  document.getElementById("history-title").textContent=L.historyTitle;
  document.getElementById("history-back").textContent=L.historyBack;
  const history=getHistory();
  const content=document.getElementById("history-content");
  if(!history.length){content.innerHTML=`<div class="history-empty">${L.historyEmpty}</div>`;return;}
  content.innerHTML=`<div class="history-list">${history.map(entry=>{
    const date=new Date(entry.date).toLocaleDateString(L.dateLocale,{month:"short",day:"numeric",weekday:"short"});
    return `<div class="history-item" data-id="${entry.id}">
      <span class="history-emoji">${entry.moodEmoji}</span>
      <div class="history-info">
        <div class="history-item-title">《${entry.result.title}》</div>
        <div class="history-item-date">${date} · ${entry.moodLabel}</div>
        <div class="history-item-opening">${entry.result.opening}</div>
      </div>
    </div>`;
  }).join("")}</div>`;
  content.querySelectorAll(".history-item").forEach(item=>{
    item.addEventListener("click",()=>{
      const id=parseInt(item.dataset.id);
      const entry=getHistory().find(e=>e.id===id);
      if(!entry) return;
      currentResult=entry;selectedMood=entry.moodKey;
      const L2=LANGS[entry.lang]||LANGS[currentLang];
      showResult(entry.result,entry.moodKey,entry.moodEmoji,L2);

    });
  });
}

function showView(id){
  ["input-view","result-view","history-view"].forEach(v=>document.getElementById(v).classList.toggle("visible",v===id));
}
